name: Daily Finance Digest

on:
  schedule:
    - cron: '0 16 * * 1-5'   # 16:00 UTC = 9:30 PM IST = 4:00 PM ET (US market close)
  workflow_dispatch:           # lets you trigger manually from the Actions tab anytime

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY:   ${{ secrets.NEWS_API_KEY }}
          BARK_KEY:       ${{ secrets.BARK_KEY }}
          DIGEST_URL:     https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python digest.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
